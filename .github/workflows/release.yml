name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build and sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Threadcode LTDA (F8KSZ6C73Q)"
        run: npm run tauri build

      - name: Submit notarization (non-blocking)
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/Amendoim.app"
          ditto -c -k --keepParent "$APP_PATH" /tmp/Amendoim.zip
          xcrun notarytool submit /tmp/Amendoim.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --no-wait || true
          echo "Notarization submitted (non-blocking). Staple manually when Apple finishes processing."

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          DMG_PATH=$(ls src-tauri/target/release/bundle/dmg/*.dmg)

          # Build latest.json for updater
          UPDATE_TAR=$(ls src-tauri/target/release/bundle/macos/*.tar.gz 2>/dev/null || echo "")
          SIG_FILE=$(ls src-tauri/target/release/bundle/macos/*.tar.gz.sig 2>/dev/null || echo "")

          ASSETS="$DMG_PATH"
          [ -n "$UPDATE_TAR" ] && ASSETS="$ASSETS $UPDATE_TAR"
          [ -n "$SIG_FILE" ] && ASSETS="$ASSETS $SIG_FILE"

          if [ -n "$UPDATE_TAR" ] && [ -n "$SIG_FILE" ]; then
            SIG_CONTENT=$(cat "$SIG_FILE")
            TAR_NAME=$(basename "$UPDATE_TAR")
            cat > /tmp/latest.json << ENDJSON
{
  "version": "$VERSION",
  "notes": "Amendoim v$VERSION",
  "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "platforms": {
    "darwin-aarch64": {
      "signature": "$SIG_CONTENT",
      "url": "https://github.com/gufao/amendoim/releases/download/v$VERSION/$TAR_NAME"
    }
  }
}
ENDJSON
            ASSETS="$ASSETS /tmp/latest.json"
          fi

          gh release create "v$VERSION" \
            --title "Amendoim v$VERSION" \
            --notes "Assinado com Developer ID Application (Threadcode LTDA). Na primeira abertura: clique direito > Abrir." \
            $ASSETS
